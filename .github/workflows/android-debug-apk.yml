name: Android APK

# Builds a sideloadable **release** Android APK (arm64) when a release is published, and attaches it
# to that GitHub Release. Also runnable on demand from the Actions tab. This is the CI mirror of
# `scripts/run-android.sh` (release) — debug-key signed (via the release signingConfig), no secrets
# needed, R8-minified + native libs compressed so it's ~half the size of the old debug artifact. The
# Play-grade signed AAB is a separate, local, keystore-backed flow (see docs/release.md §2b).
#
# NOTE (first run): Skip's Android toolchain setup (Swift Android SDK + NDK) is exacting. If the first
# run fails, the error usually names the exact missing/mismatched piece (e.g. an NDK version or a
# Swift-toolchain/SDK version skew) — pin that here and re-run. `skip doctor` output in the log helps.

on:
  release:
    types: [published]
  workflow_dispatch: {}   # manual trigger from the Actions tab

permissions:
  contents: write         # needed to attach the APK to the release

concurrency:
  group: android-debug-apk-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    # macOS: Skip Fuse compiles Swift natively for Android via the Swift Android SDK, and the Skip
    # toolchain targets macOS. Android SDK + Java come preinstalled on the runner.
    runs-on: macos-15
    timeout-minutes: 75
    steps:
      - uses: actions/checkout@v5

      # Swift 6.1+ host compiler (the Swift Android SDK must match the host toolchain).
      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      # Skip CLI drives transpile + Gradle + Swift-for-Android; the project has no gradlew, so it
      # uses a system Gradle (mirrors Android/fastlane/Fastfile, which calls the Homebrew gradle).
      - name: Install Skip + Gradle
        run: brew install skiptools/skip/skip gradle

      # Base Android SDK pieces (cmdline-tools, platform-tools) into ANDROID_HOME.
      - name: Install Android SDK (skip android home)
        run: skip android home install

      # bdk-android needs NDK 27+ (CLAUDE.md §3). If the build later asks for a specific NDK version,
      # change this to that exact version and re-run.
      - name: Install Android NDK 27+
        run: |
          SDKMANAGER="$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager"
          [ -x "$SDKMANAGER" ] || SDKMANAGER="$(command -v sdkmanager)"
          yes | "$SDKMANAGER" "ndk;27.2.12479018"
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/27.2.12479018" >> "$GITHUB_ENV"

      # Cache the Swift Android SDK so re-runs skip the ~2-min download/install. Keyed to the Skip
      # pin in Package.swift, so a Skip bump re-installs a matching SDK. `skip android sdk install`
      # below is idempotent — it no-ops fast on a cache hit.
      - name: Cache Swift Android SDK
        uses: actions/cache@v4
        with:
          path: |
            ~/.swiftpm/swift-sdks
            ~/Library/org.swift.swiftpm/swift-sdks
          key: swift-android-sdk-${{ runner.os }}-${{ hashFiles('Package.swift') }}
          restore-keys: |
            swift-android-sdk-${{ runner.os }}-

      # Swift cross-compilation SDK for Android (the Fuse native-Android build).
      - name: Install Swift Android SDK (skip android sdk)
        run: skip android sdk install

      - name: Diagnose toolchain
        run: skip doctor || true

      # Gradle's content-addressed caches + downloaded modules. Safe across machines (Gradle keys
      # entries by task-input hashes). We deliberately do NOT cache the compiled Swift/Kotlin build
      # products: this project's incremental Android transpile can desync when WalletService changes
      # ("Cannot access … internal" — see the build-speed notes), so we cache only immutable layers
      # and let the compile itself run clean each time.
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('Android/**/*.gradle*', 'Android/gradle.properties', 'Package.swift') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      # SwiftPM dependency SOURCES only (checkouts/repos/resolved artifacts) — avoids re-cloning BDK,
      # secp256k1, Skip, etc. on every run. Excludes build products for the same reason as above.
      - name: Cache SwiftPM dependencies
        uses: actions/cache@v4
        with:
          path: |
            .build/checkouts
            .build/repositories
            .build/artifacts
          key: spm-deps-${{ runner.os }}-${{ hashFiles('Package.swift', 'Packages/WalletService/Package.swift', 'Package.resolved') }}
          restore-keys: |
            spm-deps-${{ runner.os }}-

      # Firebase config (gitignored — not in the repo). The google-services Gradle plugin requires
      # Android/app/google-services.json present at build time, so decode it from a repo secret.
      # Create the secret: `base64 -i Android/app/google-services.json` → repo Settings → Secrets →
      # Actions → GOOGLE_SERVICES_JSON_BASE64. (GoogleService-Info.plist is iOS-only; not needed here.)
      - name: Write google-services.json
        run: base64 -D <<< "${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}" > Android/app/google-services.json

      # Release, arm64 only, no iOS leg. Release (not debug) because it's ~85MB smaller (R8 minify +
      # optimized Swift) AND faster at runtime, and it needs NO extra secrets — the release
      # signingConfig in Android/app/build.gradle.kts signs with the auto-generated debug keystore,
      # so this is still a freely-sideloadable, debug-key-signed APK (same as before, just smaller).
      - name: Build release APK
        run: skip export --release --no-ios --arch aarch64

      - name: Stage APK with a versioned name
        id: apk
        run: |
          set -euo pipefail
          SRC=.build/skip-export/ECashWalletMobile-release.apk
          [ -f "$SRC" ] || { echo "::error::APK not found at $SRC"; ls -R .build/skip-export || true; exit 1; }
          VERSION=$(grep -E '^MARKETING_VERSION' Skip.env | sed -E 's/.*=[[:space:]]*//' | tr -d '[:space:]')
          DEST="eCashWallet-${VERSION:-0.0.0}.apk"
          cp "$SRC" "$DEST"
          echo "path=$DEST" >> "$GITHUB_OUTPUT"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v5
        with:
          name: android-apk
          path: ${{ steps.apk.outputs.path }}
          if-no-files-found: error

      # Attach to the GitHub Release when this run was triggered by publishing one.
      - name: Attach APK to release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ github.event.release.tag_name }}" "${{ steps.apk.outputs.path }}" --clobber
